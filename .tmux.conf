unbind r
bind r source-file ~/.tmux.conf


# To rotate/swap your tmux pane layout from vertical to horizontal (or vice versa), you can use:
#  Ctrl+s + Space
set -g prefix C-s

set -g mouse on 
set -g default-terminal "tmux-256color"
# Enable color support inside of tmux.
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Add a bit more scroll history in the buffer.
set -g base-index 1              # start indexing windows at 1 instead of 0
# set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on 
set -g default-terminal "${TERM}"
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Resize panes with vim-style keys (capital H,J,K,L)
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5



bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
# Add these for session persistence/restoration
# set -g @plugin 'tmux-plugins/tmux-resurrect'   # Manual save/restore
# set -g @plugin 'tmux-plugins/tmux-continuum'   # Auto save/restore
#
# # Configure persistence
# set -g @continuum-restore 'on'                 # Restore session on tmux start
# set -g @continuum-save-interval '1'           # Auto-save every 15 minutes
# set -g @resurrect-capture-pane-contents 'on'   # Save pane contents
# set -g @resurrect-strategy-vim 'session'       # Restore vim sessions properly
# set -g @continuum-restore 'on'
#
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"

bind-key n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'

bind R display-popup \
  -d "#{pane_current_path}" \
  -w 90% \
  -h 90% \
  -E "ranger"

# set vi-mode
set-window-option -g mode-keys vi
# Copy mode keybindings - copies to system clipboard
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
# Mouse selection copies to clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"



 # Split panes.
bind-key b split-window -v
bind-key v split-window -h
run '~/.tmux/plugins/tpm/tpm'
